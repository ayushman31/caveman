<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Gameplay Ability System illustration</title>
  <desc id="desc">A stylized architecture graphic for Unreal's Gameplay Ability System showing abilities, effects, attributes, and gameplay tags connected through a shared framework.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efe6d7"/>
      <stop offset="100%" stop-color="#d8e5e1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="72" y="74" font-family="Arial, sans-serif" font-size="20" letter-spacing="4" fill="#4c5f59">UNREAL FRAMEWORK OVERVIEW</text>
  <text x="600" y="132" text-anchor="middle" font-family="Georgia, serif" font-size="48" fill="#15211e">Gameplay Ability System</text>

  <g stroke="#22322d" stroke-width="4" fill="#fffaf2">
    <rect x="108" y="220" width="220" height="120" rx="18"/>
    <rect x="382" y="220" width="220" height="120" rx="18"/>
    <rect x="656" y="220" width="220" height="120" rx="18"/>
    <rect x="930" y="220" width="160" height="120" rx="18"/>
    <rect x="374" y="430" width="452" height="128" rx="20" fill="#f7f0e4"/>
  </g>

  <g font-family="Georgia, serif" fill="#16211d" text-anchor="middle">
    <text x="218" y="285" font-size="31">Abilities</text>
    <text x="492" y="285" font-size="31">Effects</text>
    <text x="766" y="285" font-size="31">Attributes</text>
    <text x="1010" y="285" font-size="31">Tags</text>
    <text x="600" y="502" font-size="36">Reusable Gameplay Framework</text>
  </g>

  <g font-family="Arial, sans-serif" fill="#556963" text-anchor="middle" font-size="20">
    <text x="218" y="318">activation and execution</text>
    <text x="492" y="318">costs, cooldowns, payloads</text>
    <text x="766" y="318">scaling and progression data</text>
    <text x="1010" y="318">state, rules, event flow</text>
    <text x="600" y="538">shared architecture for combat, movement, and systemic mechanics</text>
  </g>

  <g stroke="#2e6b61" stroke-width="6" fill="none" stroke-linecap="round">
    <path d="M218 340L435 430"/>
    <path d="M492 340L545 430"/>
    <path d="M766 340L655 430"/>
    <path d="M1010 340L765 430"/>
  </g>
  <g fill="#2e6b61">
    <path d="M428 417l20 4-8 15z"/>
    <path d="M537 418l17 10-18 5z"/>
    <path d="M663 418l-17 10 18 5z"/>
    <path d="M772 417l-20 4 8 15z"/>
  </g>
</svg>
